name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Build
        run: dotnet build JarLens.sln -c Release -m:1
      - name: Smoke tests
        run: dotnet run --project tests/JarLens.Scanner.Tests -c Release
